name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        cd system-monitor-cli
        python -m venv .venv
        .venv/bin/pip install -r requirements.txt

    - name: Run Tests
      run: |
        cd system-monitor-cli
        make test

  docker-build:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Collector Stage
      uses: docker/build-push-action@v5
      with:
        context: ./system-monitor-cli
        file: ./system-monitor-cli/Dockerfile
        target: collector
        push: false

    - name: Build API Stage
      uses: docker/build-push-action@v5
      with:
        context: ./system-monitor-cli
        file: ./system-monitor-cli/Dockerfile
        target: api
        push: false

    - name: Build Dashboard Stage
      uses: docker/build-push-action@v5
      with:
        context: ./system-monitor-cli
        file: ./system-monitor-cli/Dockerfile
        target: dashboard
        push: false
